<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PlutoTV Style – M3U8 Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
/* ---------- RESET ---------- */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0d0d0d;
  color: #ffffff;
  font-family: "Segoe UI", Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---------- HEADER ---------- */
.header {
  background: #141414;
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 2px 6px rgba(0,0,0,.4);
  position: sticky;
  top: 0;
  z-index: 10;
}

.search__input {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #ffffff;
  padding: 0.5rem 1rem;
  border-radius: 25px;
  font-size: 0.9rem;
  width: 200px;
  transition: all 0.3s ease;
}

.search__input:focus {
  outline: none;
  border-color: #e50914;
  background: rgba(255,255,255,0.15);
  width: 250px;
}

/* ---------- MAIN ---------- */
.main {
  flex: 1;
  padding: 1.5rem;
}

/* ---------- HERO SLIDER ---------- */
.hero-slider {
  width: 100%;
  height: 45vh;
  min-height: 280px;
  overflow: hidden;
  position: relative;
  background: #0d0d0d;
}

.hero-slider__track {
  display: flex;
  height: 100%;
  transition: transform .6s ease;
}

.hero-slide {
  flex: 0 0 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  padding: 2rem;
  position: relative;
}

.hero-slide::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
}

/* título del canal */
.hero-title {
  position: relative;
  z-index: 5;
  font-size: 1.5rem;
  font-weight: bold;
  color: #fff;
  margin-bottom: 4rem;
}

/* botón EN VIVO */
.hero-live-btn {
  position: absolute;
  bottom: 1.5rem;
  left: 1.5rem;
  background: #e50914;
  color: #ffffff;
  padding: .6rem 1.2rem;
  border-radius: 4px;
  font-weight: 700;
  text-decoration: none;
  z-index: 5;
  transition: background .3s ease;
}

.hero-live-btn:hover {
  background: #ff1a25;
}

/* dots */
.hero-dots {
  position: absolute;
  bottom: 1rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: .5rem;
  z-index: 3;
}

.hero-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,.4);
  cursor: pointer;
  transition: background .3s ease;
}

.hero-dot--active {
  background: #e50914;
}

.hero-next {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  background: #e50914;
  border: none;
  color: white;
  font-size: 1.2rem;
  padding: 0.6rem 1rem;
  border-radius: 50%;
  cursor: pointer;
  z-index: 5;
}

.hero-next:hover {
  background: #ff1a25;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 768px) {
  .hero-slider {
    height: 35vh;
    min-height: 200px;
  }
}
  </style>
</head>
<body>
  <!-- header -->
  <header class="header">
    <input type="text" id="searchInput" class="search__input" placeholder="Buscar canales...">
  </header>

  <!-- slider -->
  <section class="hero-slider" id="heroSlider">
    <div class="hero-slider__track" id="heroTrack"></div>
    <!-- dots -->
    <div class="hero-dots" id="heroDots"></div>
    <!-- botón En Vivo fijo -->
    <a class="hero-live-btn" id="heroLiveBtn" href="#" target="_blank">EN VIVO</a>
    <!-- botón siguiente -->
    <button class="hero-next" id="heroNext" aria-label="Siguiente">▶</button>
  </section>

  <!-- grid -->
  <main class="main">
    <section class="channels" id="channels"></section>
  </main>

  <script type="module">
const M3U_URLS = [
  "https://raw.githubusercontent.com/HelmerLuzo/PlutoTV_HL/refs/heads/main/tv/m3u/PlutoTV_tv_ES.m3u",
  "https://raw.githubusercontent.com/R3D-GHOST/json/refs/heads/main/toro.m3u8",
  "https://raw.githubusercontent.com/HelmerLuzo/SamsungTVPlus_HL/refs/heads/main/tv/m3u/SamsungTVPlus_tv_ES.m3u"
];

const heroTrack = document.getElementById('heroTrack');
let allChannels = [];
let heroIndex = 0;
let heroInterval;

async function fetchM3U(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("Error al cargar " + url);
    return await res.text();
  } catch (err) {
    console.error("Fallo al cargar M3U:", err);
    return "";
  }
}

function parseM3U(data) {
  const lines = data.split("\n");
  const channels = [];
  let current = {};
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (line.startsWith("#EXTINF:")) {
      const nameMatch = line.match(/,(.*)$/);
      if (nameMatch) current.name = nameMatch[1].trim();
      const logoMatch = line.match(/tvg-logo="([^"]+)"/);
      if (logoMatch) current.logo = logoMatch[1];
      const grupoMatch = line.match(/group-title="([^"]+)"/);
      if (grupoMatch) current.grupo = grupoMatch[1];
    } else if (line && !line.startsWith("#")) {
      current.url = line;
      if (current.name) channels.push(current);
      current = {};
    }
  }
  return channels;
}

function buildHeroSlider(channels) {
  heroTrack.innerHTML = "";
  const selected = channels.slice(0, 6);
  selected.forEach((ch, idx) => {
    const slide = document.createElement('div');
    slide.className = 'hero-slide';
    slide.style.backgroundImage = `url(${ch.logo || 'https://via.placeholder.com/1920x1080/222/fff?text=TV'})`;
    slide.innerHTML = `<h2 class="hero-title">${ch.name}</h2>`;
    heroTrack.appendChild(slide);
  });

  // dots
  const dots = document.getElementById('heroDots');
  dots.innerHTML = "";
  selected.forEach((_, idx) => {
    const dot = document.createElement('span');
    dot.className = 'hero-dot' + (idx === 0 ? ' hero-dot--active' : '');
    dot.addEventListener('click', () => {
      goToSlide(idx, selected);
    });
    dots.appendChild(dot);
  });

  if (selected.length) {
    document.getElementById('heroLiveBtn').href = selected[0].url;
  }

  startAutoSlide(selected.length, selected);
}

function goToSlide(idx, selected) {
  heroIndex = idx;
  heroTrack.style.transform = `translateX(-${idx * 100}%)`;
  document.querySelectorAll('.hero-dot').forEach((d, i) => {
    d.classList.toggle('hero-dot--active', i === idx);
  });
  document.getElementById('heroLiveBtn').href = selected[idx].url;
}

function startAutoSlide(len, selected) {
  if (heroInterval) clearInterval(heroInterval);
  heroInterval = setInterval(() => {
    heroIndex = (heroIndex + 1) % len;
    goToSlide(heroIndex, selected);
  }, 10000); // 10s
}

async function loadChannels() {
  for (const url of M3U_URLS) {
    const data = await fetchM3U(url);
    if (!data) continue;
    const channels = parseM3U(data);
    allChannels.push(...channels);
  }
  buildHeroSlider(allChannels);
}

document.getElementById('heroNext').addEventListener('click', () => {
  const total = document.querySelectorAll('.hero-slide').length;
  if (total === 0) return;
  heroIndex = (heroIndex + 1) % total;
  const selected = allChannels.slice(0, 6);
  goToSlide(heroIndex, selected);
});

loadChannels();
  </script>
</body>
</html>
