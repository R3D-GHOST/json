
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IPTV La Liga</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
:root {
    --primary-color: #e50914;
    --bg-dark: #0a0a0a;
    --text-primary: #ffffff;
    --text-secondary: #b3b3b3;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    overflow-x: hidden;
}

/* Header con hero */
.hero-section {
    position: relative;
    height: 80vh;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    overflow: hidden;
}

.hero-background {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('');
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
}

.hero-background::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.1) 100%);
}

.hero-content {
    position: relative;
    z-index: 10;
    padding: 60px;
}

.match-info-left {
    text-align: left;
    max-width: 500px;
}

.match-title {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 800;
    margin-bottom: 8px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
}

.match-subtitle {
    font-size: 1.3rem;
    color: var(--text-secondary);
    margin-bottom: 20px;
}

.watch-button {
    display: inline-block;
    background: var(--primary-color);
    color: white;
    padding: 14px 48px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.watch-button:hover { background: #f40612; transform: scale(1.05); }

/* Main contenido */
.main-content {
    padding: 40px 20px;
    max-width: 1400px;
    margin: 0 auto;
}

/* Slider horizontal */
.channels-horizontal-scroll {
    display: flex;
    overflow-x: auto;
    gap: 20px;
    padding: 10px 0;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
}
.channels-horizontal-scroll::-webkit-scrollbar { display: none; }

/* Canal */
.channel-card-landscape {
    flex: 0 0 auto;
    width: 280px;
    height: 160px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    backdrop-filter: blur(10px);
}
.channel-card-landscape:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(229,9,20,0.3);
}

.channel-link-landscape { display: block; width: 100%; height: 100%; text-decoration:none; color:var(--text-primary); position:relative; }

.channel-thumbnail { width:100%; height:100%; position:relative; overflow:hidden; }

.channel-overlay {
    position: absolute;
    bottom: 0; left:0; right:0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 10px;
}
.channel-name-landscape { font-size:16px; font-weight:600; }
.channel-group { font-size:12px; color:var(--text-secondary); }

@media(max-width:768px) {
    .hero-content { padding:40px 20px; }
    .match-title { font-size:2.5rem; }
    .channel-card-landscape { width:240px; height:135px; }
}
    </style>
</head>
<body>

    <!-- Header -->
    <header class="hero-section">
        <div class="hero-background"></div>
        <div class="hero-content">
            <div class="match-info-left">
                <h1 class="match-title">Cargando...</h1>
                <p class="match-subtitle">EN VIVO • En Directo</p>
                <a href="#" class="watch-button" target="_blank">En Directo</a>
            </div>
        </div>
    </header>

    <!-- Slider de canales -->
    <main class="main-content">
        <div class="channels-horizontal-scroll" id="slider-canales"></div>
    </main>

    <script>
async function cargarM3U8(url) {
    try {
        const resp = await fetch(url);
        const texto = await resp.text();
        const lineas = texto.split("\n");
        const canales = [];
        let canal = null;

        lineas.forEach(linea => {
            linea = linea.trim();
            if (linea.startsWith("#EXTINF:")) {
                const nombre = linea.split(",").pop().trim();
                const logoMatch = linea.match(/tvg-logo="([^"]*)"/);
                const grupoMatch = linea.match(/group-title="([^"]*)"/);

                canal = {
                    nombre: nombre || "Canal sin nombre",
                    logo: logoMatch ? logoMatch[1] : null,
                    grupo: grupoMatch ? grupoMatch[1] : "General",
                    url: null
                };
            } else if (linea.startsWith("http") && canal) {
                canal.url = linea;
                canales.push(canal);
                canal = null;
            }
        });

        return canales;
    } catch(e) {
        console.error("Error al cargar lista:", e);
        return [];
    }
}

function renderCanales(canales) {
    const container = document.getElementById('slider-canales');
    // Filtrar para excluir el grupo "En Directo" del slider
    const canalesRestantes = canales.filter(canal => canal.grupo !== "En Directo");
    
    canalesRestantes.forEach((canal, index) => {
        const div = document.createElement('div');
        div.className = 'channel-card-landscape';

        const a = document.createElement('a');
        a.href = canal.url;
        a.target = '_blank';
        a.className = 'channel-link-landscape';

        const thumbnail = document.createElement('div');
        thumbnail.className = 'channel-thumbnail';
        thumbnail.style.backgroundImage = canal.logo ? `url(${canal.logo})` : 'none';
        thumbnail.style.backgroundSize = 'cover';
        thumbnail.style.backgroundPosition = 'center';
        thumbnail.style.backgroundRepeat = 'no-repeat';
        if (!canal.logo) thumbnail.style.backgroundColor = '#1a1a1a';

        const overlay = document.createElement('div');
        overlay.className = 'channel-overlay';

        const name = document.createElement('div');
        name.className = 'channel-name-landscape';
        name.textContent = canal.nombre;

        const group = document.createElement('div');
        group.className = 'channel-group';
        group.textContent = canal.grupo;

        overlay.appendChild(name);
        overlay.appendChild(group);
        thumbnail.appendChild(overlay);
        a.appendChild(thumbnail);
        div.appendChild(a);
        container.appendChild(div);
    });
}

function actualizarHeader(canal) {
    const matchTitle = document.querySelector('.match-title');
    const watchButton = document.querySelector('.watch-button');
    const heroBackground = document.querySelector('.hero-background');

    if (canal) {
        matchTitle.textContent = canal.nombre;
        watchButton.href = canal.url;

        // Usar logo si existe, si no, imagen de fallback
        const logoUrl = canal.logo || 'https://via.placeholder.com/800x450?text=En+Directo';
        heroBackground.style.backgroundImage = `url(${logoUrl})`;
    }
}

(async function init() {
    const canales = await cargarM3U8("https://raw.githubusercontent.com/R3D-GHOST/json/refs/heads/main/toro.m3u8");
    
    // Tomar primer canal "En Directo" para header
    const canalEnDirecto = canales.find(canal => canal.grupo === "En Directo");
    if (canalEnDirecto) actualizarHeader(canalEnDirecto);

    renderCanales(canales);
})();
    </script>

</body>
</html>
