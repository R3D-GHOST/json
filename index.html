<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IPTV La Liga</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --disney-blue: #006ba6;
    --disney-light-blue: #00a5e0;
    --bg-dark: #0a0a0a;
    --text-primary: #ffffff;
    --text-secondary: #b3b3b3;
    --glass-bg: rgba(26,26,26,0.8);
    --glass-border: rgba(255,255,255,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    overflow-x: hidden;
}

/* Header con hero estilo Disney+ */
.hero-section {
    position: relative;
    height: 60vh;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    overflow: hidden;
}

.hero-background {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 1s ease, background-image 0.5s ease;
    opacity: 1;
    animation: heroZoom 20s infinite alternate ease-in-out;
}

@keyframes heroZoom {
    0% { transform: scale(1); }
    100% { transform: scale(1.05); }
}

.hero-background.fade-out { opacity: 0; }

.hero-background::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(0,107,166,0.9) 0%, rgba(0,107,166,0.3) 50%, rgba(0,107,166,0.1) 100%);
}

.hero-content {
    position: relative;
    z-index: 10;
    padding: 40px;
}

.match-info-left {
    text-align: left;
    max-width: 500px;
}

.match-title {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    margin-bottom: 8px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    transition: opacity 0.5s ease;
    animation: slideInLeft 0.8s ease-out;
}

@keyframes slideInLeft {
    from { transform: translateX(-100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

.match-title.fade { opacity: 0; }

.match-subtitle {
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-bottom: 20px;
    animation: slideInLeft 0.8s ease-out 0.2s both;
}

.watch-button {
    display: inline-block;
    background: var(--disney-blue);
    color: white;
    padding: 12px 36px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    animation: slideInLeft 0.8s ease-out 0.4s both;
    position: relative;
    overflow: hidden;
}

.watch-button::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
}

.watch-button:hover::before { left: 100%; }

.watch-button:hover { background: var(--disney-light-blue); transform: scale(1.05); box-shadow: 0 0 20px rgba(0,107,166,0.6); }

/* Main contenido */
.main-content {
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
}

/* Contenedor de guía con scroll horizontal */
.guide-container {
    overflow-x: auto;
    overflow-y: hidden;
    margin-top: 20px;
    border-radius: 12px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.guide-table {
    min-width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

/* Cabecera de la guía */
.guide-header {
    background: rgba(0,107,166,0.2);
    position: sticky;
    top: 0;
    z-index: 10;
}

.guide-header th {
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--text-primary);
    border-bottom: 2px solid var(--disney-blue);
    white-space: nowrap;
}

.guide-header .channel-number {
    width: 80px;
    text-align: center;
}

.guide-header .channel-logo {
    width: 100px;
}

.guide-header .channel-name {
    min-width: 200px;
}

.guide-header .channel-group {
    width: 150px;
}

.guide-header .channel-status {
    width: 100px;
    text-align: center;
}

/* Filas de canales */
.guide-row {
    border-bottom: 1px solid var(--glass-border);
    transition: all 0.3s ease;
    cursor: pointer;
}

.guide-row:hover {
    background: rgba(0,107,166,0.1);
    transform: scale(1.01);
}

.guide-row td {
    padding: 12px 16px;
    vertical-align: middle;
}

.channel-number-td {
    text-align: center;
    font-weight: 700;
    color: var(--disney-blue);
    font-size: 16px;
}

.channel-logo-td img {
    width: 60px;
    height: 34px;
    object-fit: cover;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.channel-name-td {
    font-weight: 600;
    color: var(--text-primary);
}

.channel-group-td {
    color: var(--text-secondary);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.channel-status-td {
    text-align: center;
}

.live-badge {
    display: inline-block;
    background: #e50914;
    color: white;
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

/* Skeleton loading para la tabla */
.skeleton-row {
    background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: loading 1.2s infinite;
}

@keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* Scrollbar personalizada */
.guide-container::-webkit-scrollbar {
    height: 8px;
}

.guide-container::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
}

.guide-container::-webkit-scrollbar-thumb {
    background: var(--disney-blue);
    border-radius: 4px;
}

.guide-container::-webkit-scrollbar-thumb:hover {
    background: var(--disney-light-blue);
}

/* Reduce animaciones en dispositivos de gama baja */
@media (prefers-reduced-motion: reduce) {
    .channel-card-grid {
        transition: none;
    }
    .hero-background {
        animation: none;
    }
}

/* Responsive */
@media(max-width:768px) {
    .hero-content { padding:30px 20px; }
    .match-title { font-size:2rem; }
    
    .guide-table {
        font-size: 12px;
    }
    
    .guide-header th {
        padding: 8px 12px;
    }
    
    .guide-row td {
        padding: 8px 12px;
    }
    
    .channel-logo-td img {
        width: 50px;
        height: 28px;
    }
    
    .channel-name-td {
        min-width: 150px;
    }
}
</style>
</head>
<body>

<!-- Header -->
<header class="hero-section">
    <div class="hero-background"></div>
    <div class="hero-content">
        <div class="match-info-left">
            <h1 class="match-title">Cargando...</h1>
            <p class="match-subtitle">EN VIVO •</p>
            <a href="#" class="watch-button" target="_blank">En Directo</a>
        </div>
    </div>
</header>

<!-- Contenido principal -->
<main class="main-content">
    <!-- Guía de canales -->
    <div class="guide-container">
        <table class="guide-table">
            <thead class="guide-header">
                <tr>
                    <th class="channel-number">#</th>
                    <th class="channel-logo">Logo</th>
                    <th class="channel-name">Canal</th>
                    <th class="channel-group">Grupo</th>
                    <th class="channel-status">Estado</th>
                </tr>
            </thead>
            <tbody id="guide-body">
                <!-- Las filas se cargarán dinámicamente -->
            </tbody>
        </table>
    </div>
</main>

<script>
let canalesData = [];
let allCanales = [];
let currentOffset = 0;
const ITEMS_PER_BATCH = 50;

// Array de URLs de playlists
const PLAYLIST_URLS = [
    "",
    "https://raw.githubusercontent.com/R3D-GHOST/json/refs/heads/main/toro.m3u8",
    ""
];

async function cargarM3U8(url) {
    try {
        const resp = await fetch(url);
        const texto = await resp.text();
        const lineas = texto.split("\n");
        const canales = [];
        let canal = null;

        lineas.forEach(linea => {
            linea = linea.trim();
            if (linea.startsWith("#EXTINF:")) {
                const nombre = linea.split(",").pop().trim();
                const logoMatch = linea.match(/tvg-logo="([^"]*)"/);
                const grupoMatch = linea.match(/group-title="([^"]*)"/);
                const idMatch = linea.match(/tvg-id="([^"]*)"/);

                canal = {
                    nombre: nombre || "Canal sin nombre",
                    logo: logoMatch ? logoMatch[1] : null,
                    grupo: grupoMatch ? grupoMatch[1] : "General",
                    id: idMatch ? idMatch[1] : null,
                    url: null,
                    numero: null
                };
            } else if (linea.startsWith("http") && canal) {
                canal.url = linea;
                // Asignar número de canal basado en el orden
                canal.numero = canales.length + 1;
                canales.push(canal);
                canal = null;
            }
        });

        return canales;
    } catch(e) {
        console.error("Error al cargar lista:", e);
        return [];
    }
}

async function cargarTodasLasListas() {
    const todosLosCanales = [];
    
    for (const url of PLAYLIST_URLS) {
        if (url.trim()) {
            const canales = await cargarM3U8(url);
            todosLosCanales.push(...canales);
        }
    }
    
    return todosLosCanales;
}

function renderGuia(canales) {
    const tbody = document.getElementById('guide-body');
    const fragment = document.createDocumentFragment();
    
    // Limpiar skeletons si existen
    document.querySelectorAll('.skeleton-row').forEach(s => s.remove());
    
    canales.forEach((canal, index) => {
        const row = document.createElement('tr');
        row.className = 'guide-row';
        row.style.animationDelay = `${index * 0.02}s`;
        row.style.animation = 'fadeInScale 0.6s ease-out';
        
        // Número de canal
        const numberTd = document.createElement('td');
        numberTd.className = 'channel-number-td';
        numberTd.textContent = canal.numero || index + 1;
        
        // Logo
        const logoTd = document.createElement('td');
        logoTd.className = 'channel-logo-td';
        if (canal.logo) {
            const img = document.createElement('img');
            img.src = canal.logo;
            img.alt = canal.nombre;
            img.loading = 'lazy';
            logoTd.appendChild(img);
        } else {
            const placeholder = document.createElement('div');
            placeholder.style.width = '60px';
            placeholder.style.height = '34px';
            placeholder.style.background = '#1a1a1a';
            placeholder.style.borderRadius = '4px';
            logoTd.appendChild(placeholder);
        }
        
        // Nombre
        const nameTd = document.createElement('td');
        nameTd.className = 'channel-name-td';
        nameTd.textContent = canal.nombre;
        
        // Grupo
        const groupTd = document.createElement('td');
        groupTd.className = 'channel-group-td';
        groupTd.textContent = canal.grupo;
        
        // Estado
        const statusTd = document.createElement('td');
        statusTd.className = 'channel-status-td';
        if (Math.random() > 0.7) {
            const liveBadge = document.createElement('span');
            liveBadge.className = 'live-badge';
            liveBadge.textContent = 'EN VIVO';
            statusTd.appendChild(liveBadge);
        }
        
        // Click handler
        row.addEventListener('click', () => {
            if (canal.url) {
                window.open(canal.url, '_blank');
            }
        });
        
        row.appendChild(numberTd);
        row.appendChild(logoTd);
        row.appendChild(nameTd);
        row.appendChild(groupTd);
        row.appendChild(statusTd);
        
        fragment.appendChild(row);
    });
    
    tbody.appendChild(fragment);
}

function actualizarHeader(canal) {
    const matchTitle = document.querySelector('.match-title');
    const watchButton = document.querySelector('.watch-button');
    const heroBackground = document.querySelector('.hero-background');

    matchTitle.classList.add('fade');
    heroBackground.classList.add('fade-out');

    setTimeout(() => {
        matchTitle.textContent = canal.nombre;
        watchButton.href = canal.url;
        const logoUrl = canal.logo || 'https://via.placeholder.com/800x450?text=En+Directo';
        heroBackground.style.backgroundImage = `url(${logoUrl})`;
        matchTitle.classList.remove('fade');
        heroBackground.classList.remove('fade-out');
    }, 500);
}

// Rotación automática de canales en el header
let currentIndex = 0;
let autoRotate;

function startAutoRotate() {
    if (canalesData.length <= 1) return;
    autoRotate = setInterval(() => {
        currentIndex = (currentIndex + 1) % canalesData.length;
        actualizarHeader(canalesData[currentIndex]);
    }, 5000);
}

// Scroll infinito con lazy loading
function loadMore() {
    const nextBatch = allCanales.slice(currentOffset, currentOffset + ITEMS_PER_BATCH);
    if (nextBatch.length === 0) return;
    
    // Añadir skeletons mientras carga
    const tbody = document.getElementById('guide-body');
    for (let i = 0; i < Math.min(ITEMS_PER_BATCH, 5); i++) {
        const skeletonRow = document.createElement('tr');
        skeletonRow.className = 'skeleton-row';
        skeletonRow.innerHTML = `
            <td><div style="height: 20px; width: 30px; margin: 0 auto; background: #2a2a2a; border-radius: 4px;"></div></td>
            <td><div style="height: 34px; width: 60px; background: #2a2a2a; border-radius: 4px;"></div></td>
            <td><div style="height: 20px; background: #2a2a2a; border-radius: 4px;"></div></td>
            <td><div style="height: 16px; background: #2a2a2a; border-radius: 4px;"></div></td>
            <td><div style="height: 20px; width: 40px; margin: 0 auto; background: #2a2a2a; border-radius: 4px;"></div></td>
        `;
        tbody.appendChild(skeletonRow);
    }
    
    // Retrasar la carga real para mejorar percepción
    setTimeout(() => {
        // Eliminar skeletons
        document.querySelectorAll('.skeleton-row').forEach(s => s.remove());
        renderGuia(nextBatch);
        currentOffset += ITEMS_PER_BATCH;
    }, 100);
}

// Optimización del scroll con requestAnimationFrame
let ticking = false;
let lastScrollY = 0;

function updateScrollPosition() {
    const scrollY = window.scrollY;
    
    if (Math.abs(scrollY - lastScrollY) > 50) {
        lastScrollY = scrollY;
        
        if (window.innerHeight + scrollY >= document.body.offsetHeight - 200) {
            loadMore();
        }
    }
    
    ticking = false;
}

function requestScrollUpdate() {
    if (!ticking) {
        window.requestAnimationFrame(updateScrollPosition);
        ticking = true;
    }
}

// Reemplazar el scroll listener anterior
window.addEventListener('scroll', requestScrollUpdate, { passive: true });

// CSS para animación de fade in
const style = document.createElement('style');
style.textContent = `
@keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}
`;
document.head.appendChild(style);

(async function init() {
    // Cargar todas las playlists
    allCanales = await cargarTodasLasListas();

    // Filtrar y ocultar grupo "En Directo"
    canalesData = allCanales.filter(canal => canal.grupo === "En Directo");
    const canalesFiltrados = allCanales.filter(canal => canal.grupo !== "En Directo");

    if (canalesData.length > 0) {
        actualizarHeader(canalesData[0]);
        startAutoRotate();
    }

    allCanales = canalesFiltrados;
    
    // Cargar primer batch de canales
    loadMore();
})();
</script>

</body>
</html>
