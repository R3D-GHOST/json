<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IPTV La Liga</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --primary-color: #e50914;
    --bg-dark: #0a0a0a;
    --text-primary: #ffffff;
    --text-secondary: #b3b3b3;
    --glass-bg: rgba(20,20,20,0.6);
    --glass-border: rgba(255,255,255,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    overflow-x: hidden;
}

/* Header con hero */
.hero-section {
    position: relative;
    height: 60vh;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    overflow: hidden;
}

.hero-background {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 1s ease, background-image 0.5s ease;
    opacity: 1;
    animation: heroZoom 20s infinite alternate ease-in-out;
}

@keyframes heroZoom {
    0% { transform: scale(1); }
    100% { transform: scale(1.05); }
}

.hero-background.fade-out { opacity: 0; }

.hero-background::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.1) 100%);
}

.hero-content {
    position: relative;
    z-index: 10;
    padding: 40px;
}

.match-info-left {
    text-align: left;
    max-width: 500px;
}

.match-title {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    margin-bottom: 8px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    transition: opacity 0.5s ease;
    animation: slideInLeft 0.8s ease-out;
}

@keyframes slideInLeft {
    from { transform: translateX(-100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

.match-title.fade { opacity: 0; }

.match-subtitle {
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-bottom: 20px;
    animation: slideInLeft 0.8s ease-out 0.2s both;
}

.watch-button {
    display: inline-block;
    background: var(--primary-color);
    color: white;
    padding: 12px 36px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    animation: slideInLeft 0.8s ease-out 0.4s both;
    position: relative;
    overflow: hidden;
}

.watch-button::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
}

.watch-button:hover::before { left: 100%; }

.watch-button:hover { background: #f40612; transform: scale(1.05); box-shadow: 0 0 20px rgba(229,9,20,0.6); }

/* Main contenido */
.main-content {
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
}

/* Grilla de canales estilo Netflix */
#canales-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    padding: 10px 0;
    content-visibility: auto;
    contain-intrinsic-size: auto 160px;
}

/* Canal estilo mosaico con glassmorfismo */
.channel-card-grid {
    aspect-ratio: 16/9;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    backdrop-filter: blur(10px);
    position: relative;
    transform-style: preserve-3d;
    animation: fadeInScale 0.6s ease-out;
    will-change: transform;
    contain: layout style paint;
}

@keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

.channel-card-grid:hover {
    transform: scale(1.08) rotateY(5deg);
    box-shadow: 0 15px 35px rgba(229,9,20,0.4);
    border-color: rgba(229,9,20,0.3);
}

.channel-card-grid * {
    will-change: opacity, transform;
}

.channel-link-grid { display: block; width: 100%; height: 100%; text-decoration:none; color:var(--text-primary); position:relative; }

.channel-thumbnail {
    width:100%; 
    height:100%; 
    position:relative; 
    overflow:hidden;
    background-color: #1a1a1a;
    transition: background-image 0.3s ease;
}

.channel-overlay {
    position: absolute;
    bottom: 0; left:0; right:0;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    padding: 8px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
}

.channel-card-grid:hover .channel-overlay { transform: translateY(0); }

.channel-name-grid { 
    font-size:13px; 
    font-weight:600; 
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    animation: slideInUp 0.3s ease;
}

@keyframes slideInUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* Skeleton loading */
.skeleton {
    background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: loading 1.2s infinite;
    border-radius: 12px;
}

@keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* Parpadeo de en vivo */
.live-indicator {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--primary-color);
    color: white;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

/* Reduce animaciones en dispositivos de gama baja */
@media (prefers-reduced-motion: reduce) {
    .channel-card-grid {
        transition: none;
    }
    .hero-background {
        animation: none;
    }
}

/* Responsive */
@media(max-width:768px) {
    .hero-content { padding:30px 20px; }
    .match-title { font-size:2rem; }
    #canales-grid { 
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
    }
}
</style>
</head>
<body>

<!-- Header -->
<header class="hero-section">
    <div class="hero-background"></div>
    <div class="hero-content">
        <div class="match-info-left">
            <h1 class="match-title">Cargando...</h1>
            <p class="match-subtitle">EN VIVO •</p>
            <a href="#" class="watch-button" target="_blank">En Directo</a>
        </div>
    </div>
</header>

<!-- Contenido principal -->
<main class="main-content">
    <!-- Grilla de canales -->
    <div id="canales-grid"></div>
</main>

<script>
let canalesData = [];
let allCanales = [];
let currentOffset = 0;
const ITEMS_PER_BATCH = 30;

// Array de URLs de playlists
const PLAYLIST_URLS = [
    "https://raw.githubusercontent.com/R3D-GHOST/json/refs/heads/main/toro.m3u8",
    "https://raw.githubusercontent.com/jsosao/Drewski2423_DrewLive/refs/heads/main/PlutoTV.m3u8"
];

async function cargarM3U8(url) {
    try {
        const resp = await fetch(url);
        const texto = await resp.text();
        const lineas = texto.split("\n");
        const canales = [];
        let canal = null;

        lineas.forEach(linea => {
            linea = linea.trim();
            if (linea.startsWith("#EXTINF:")) {
                const nombre = linea.split(",").pop().trim();
                const logoMatch = linea.match(/tvg-logo="([^"]*)"/);
                const grupoMatch = linea.match(/group-title="([^"]*)"/);

                canal = {
                    nombre: nombre || "Canal sin nombre",
                    logo: logoMatch ? logoMatch[1] : null,
                    grupo: grupoMatch ? grupoMatch[1] : "General",
                    url: null
                };
            } else if (linea.startsWith("http") && canal) {
                canal.url = linea;
                canales.push(canal);
                canal = null;
            }
        });

        return canales;
    } catch(e) {
        console.error("Error al cargar lista:", e);
        return [];
    }
}

async function cargarTodasLasListas() {
    const todosLosCanales = [];
    
    for (const url of PLAYLIST_URLS) {
        const canales = await cargarM3U8(url);
        todosLosCanales.push(...canales);
    }
    
    return todosLosCanales;
}

function renderCanalesGrid(canales) {
    const container = document.getElementById('canales-grid');
    const fragment = document.createDocumentFragment();
    
    canales.forEach((canal, idx) => {
        const div = document.createElement('div');
        div.className = 'channel-card-grid';
        div.style.animationDelay = `${(idx % ITEMS_PER_BATCH) * 0.02}s`;

        const link = document.createElement('a');
        link.href = canal.url;
        link.target = '_blank';
        link.className = 'channel-link-grid';

        const thumbnail = document.createElement('div');
        thumbnail.className = 'channel-thumbnail';
        
        // Lazy loading con Intersection Observer
        thumbnail.dataset.src = canal.logo || '';
        thumbnail.classList.add('lazy-load');
        if (!canal.logo) thumbnail.style.backgroundColor = '#1a1a1a';

        // Indicador de en vivo aleatorio
        if (Math.random() > 0.7) {
            const live = document.createElement('div');
            live.className = 'live-indicator';
            live.textContent = 'EN VIVO';
            thumbnail.appendChild(live);
        }

        const overlay = document.createElement('div');
        overlay.className = 'channel-overlay';

        const name = document.createElement('div');
        name.className = 'channel-name-grid';
        name.textContent = canal.nombre;

        overlay.appendChild(name);
        thumbnail.appendChild(overlay);
        link.appendChild(thumbnail);
        div.appendChild(link);
        fragment.appendChild(div);
    });
    
    container.appendChild(fragment);
}

// Lazy loading con Intersection Observer
let lazyObserver;
function setupLazyLoading() {
    if ('IntersectionObserver' in window) {
        lazyObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    const src = img.dataset.src;
                    if (src) {
                        img.style.backgroundImage = `url(${src})`;
                        img.style.backgroundSize = 'cover';
                        img.style.backgroundPosition = 'center';
                        img.style.backgroundRepeat = 'no-repeat';
                    }
                    img.classList.remove('lazy-load');
                    lazyObserver.unobserve(img);
                }
            });
        }, {
            rootMargin: '50px 0px',
            threshold: 0.01
        });
    }
}

function loadMore() {
    const nextBatch = allCanales.slice(currentOffset, currentOffset + ITEMS_PER_BATCH);
    if (nextBatch.length === 0) return;
    
    // Añadir skeleton mientras carga
    const container = document.getElementById('canales-grid');
    for (let i = 0; i < Math.min(ITEMS_PER_BATCH, 6); i++) {
        const skeleton = document.createElement('div');
        skeleton.className = 'channel-card-grid skeleton';
        container.appendChild(skeleton);
    }
    
    // Retrasar la carga real para mejorar percepción
    setTimeout(() => {
        // Eliminar skeletons
        document.querySelectorAll('.skeleton').forEach(s => s.remove());
        renderCanalesGrid(nextBatch);
        currentOffset += ITEMS_PER_BATCH;
        
        // Observar nuevos elementos lazy
        document.querySelectorAll('.lazy-load').forEach(img => {
            lazyObserver.observe(img);
        });
    }, 100);
}

function actualizarHeader(canal) {
    const matchTitle = document.querySelector('.match-title');
    const watchButton = document.querySelector('.watch-button');
    const heroBackground = document.querySelector('.hero-background');

    matchTitle.classList.add('fade');
    heroBackground.classList.add('fade-out');

    setTimeout(() => {
        matchTitle.textContent = canal.nombre;
        watchButton.href = canal.url;
        const logoUrl = canal.logo || 'https://via.placeholder.com/800x450?text=En+Directo';
        heroBackground.style.backgroundImage = `url(${logoUrl})`;
        matchTitle.classList.remove('fade');
        heroBackground.classList.remove('fade-out');
    }, 500);
}

// Optimización del scroll con requestAnimationFrame
let ticking = false;
let lastScrollY = 0;

function updateScrollPosition() {
    const scrollY = window.scrollY;
    
    if (Math.abs(scrollY - lastScrollY) > 50) {
        lastScrollY = scrollY;
        
        if (window.innerHeight + scrollY >= document.body.offsetHeight - 200) {
            loadMore();
        }
    }
    
    ticking = false;
}

function requestScrollUpdate() {
    if (!ticking) {
        window.requestAnimationFrame(updateScrollPosition);
        ticking = true;
    }
}

// Reemplazar el scroll listener anterior
window.addEventListener('scroll', requestScrollUpdate, { passive: true });

// Rotación automática de canales en el header
let currentIndex = 0;
let autoRotate;

function startAutoRotate() {
    if (canalesData.length <= 1) return;
    autoRotate = setInterval(() => {
        currentIndex = (currentIndex + 1) % canalesData.length;
        actualizarHeader(canalesData[currentIndex]);
    }, 5000);
}

(async function init() {
    // Cargar todas las playlists
    allCanales = await cargarTodasLasListas();

    // Filtrar y ocultar grupo "En Directo"
    canalesData = allCanales.filter(canal => canal.grupo === "En Directo");
    const canalesFiltrados = allCanales.filter(canal => canal.grupo !== "En Directo");

    if (canalesData.length > 0) {
        actualizarHeader(canalesData[0]);
        startAutoRotate();
    }

    allCanales = canalesFiltrados;
    setupLazyLoading();
    loadMore(); // primera carga
})();
</script>

</body>
</html>
