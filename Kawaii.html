
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Kawaii Play v2</title>
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary-bg: #0a0a0a;
  --secondary-bg: #141414;
  --card-bg: #1a1a1a;
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --accent-purple: #9333ea;
  --accent-pink: #ec4899;
  --accent-blue: #3b82f6;
  --border-color: #2a2a2a;
  --watched-color: #10b981;
  --gradient-1: linear-gradient(135deg, #9333ea 0%, #ec4899 100%);
  --gradient-2: linear-gradient(135deg, #3b82f6 0%, #9333ea 100%);
  --glass-bg: rgba(26, 26, 26, 0.8);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--primary-bg);
  color: var(--text-primary);
  overscroll-behavior-y: contain;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* --- Loader --- */
.loader-container {
  position: fixed;
  inset: 0;
  background: var(--primary-bg);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  transition: opacity 0.5s ease;
}

.loader {
  width: 60px;
  height: 60px;
  border: 3px solid rgba(147, 51, 234, 0.3);
  border-top: 3px solid var(--accent-purple);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loader-container.hidden {
  opacity: 0;
  pointer-events: none;
}

/* --- Header --- */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to bottom, rgba(10, 10, 10, 0.95) 0%, rgba(10, 10, 10, 0) 100%);
  padding: 16px 20px;
  z-index: 100;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.header-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1400px;
  margin: 0 auto;
}

.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 700;
  background: var(--gradient-1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
  letter-spacing: -1px;
}

.nav-menu {
  display: flex;
  gap: 24px;
  align-items: center;
}

.nav-item {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s ease;
  position: relative;
}

.nav-item:hover,
.nav-item.active {
  color: var(--text-primary);
}

.nav-item.active::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent-purple);
}

.header-actions {
  display: flex;
  gap: 16px;
  align-items: center;
}

.header-btn {
  background: var(--glass-bg);
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--text-primary);
  backdrop-filter: blur(10px);
}

.header-btn:hover {
  background: rgba(147, 51, 234, 0.2);
  transform: scale(1.1);
}

/* --- Main Content --- */
.main-content {
  padding-top: 80px;
  min-height: 100vh;
  padding-bottom: 80px;
}

.screen {
  display: none;
  animation: fadeIn 0.3s ease;
}

.screen.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* --- Hero Section --- */
.hero-section {
  position: relative;
  height: 80vh;
  overflow: hidden;
  margin-bottom: 40px;
}

.hero-background {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: transform 0.8s ease;
  filter: brightness(0.4);
}

.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(0, 0, 0, 0.5) 50%,
    rgba(0, 0, 0, 0.9) 100%
  );
}

.hero-content {
  position: absolute;
  bottom: 20%;
  left: 60px;
  max-width: 600px;
  z-index: 10;
}

.hero-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 4rem;
  font-weight: 700;
  margin: 0 0 20px 0;
  text-shadow: 2px 2px 20px rgba(0,0,0,0.8);
  line-height: 1.1;
  background: linear-gradient(135deg, #ffffff 0%, #ec4899 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-description {
  display: none;
}

.hero-actions {
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}

.hero-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 28px;
  border: none;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
}

.hero-btn-primary {
  background: var(--gradient-1);
  color: white;
}

.hero-btn-primary:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
}

.hero-btn-secondary {
  background: var(--glass-bg);
  color: white;
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-color);
}

.hero-btn-secondary:hover {
  background: rgba(255, 255, 255, 0.1);
}

/* --- Genre Navigation --- */
.genre-nav {
  padding: 0 60px;
  margin-bottom: 30px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.genre-list {
  display: flex;
  gap: 16px;
  min-width: max-content;
}

.genre-item {
  background: var(--card-bg);
  color: var(--text-secondary);
  border: 1px solid var(--border-color);
  padding: 10px 20px;
  border-radius: 25px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.genre-item:hover,
.genre-item.active {
  background: var(--accent-purple);
  color: white;
  border-color: var(--accent-purple);
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(147, 51, 234, 0.3);
}

/* --- Content Sections --- */
.content-section {
  padding: 0 60px;
  margin-bottom: 50px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-title {
  font-size: 24px;
  font-weight: 700;
  margin: 0;
  color: var(--text-primary);
}

.section-subtitle {
  color: var(--text-secondary);
  font-size: 14px;
}

.content-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 0 20px;
}

.card {
  aspect-ratio: 3/4;
  background: var(--card-bg);
  border-radius: 8px;
  cursor: pointer;
  overflow: hidden;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card h3 {
  display: none;
}

a {
  text-decoration: none;
  color: inherit;
}

.row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 10px 20px;
}

.episode-description,
.card-overlay,
.card-meta {
  display: none;
}

.nav-link,
.nav-item {
  text-decoration: none;
}

.content-card {
  display: block;
  position: relative;
}

.content-card .card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.content-card .card-overlay,
.content-card .card-title,
.content-card .card-meta {
  display: none;
}

.season-indicator {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gradient-1);
  color: white;
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.content-card:hover .season-indicator {
  opacity: 1;
}

.content-card {
  position: relative;
  margin-top: 12px;
}

.content-grid .season-indicator,
.search-grid .season-indicator,
#movies-content .season-indicator,
#series-content .season-indicator,
#favorites-content .season-indicator {
  display: block !important;
}

.content-card.movie .season-indicator {
  display: none !important;
}

/* --- Detail Screen --- */
.detail-screen {
  min-height: 100vh;
  background: var(--primary-bg);
}

.detail-hero {
  position: relative;
  height: 70vh;
  overflow: hidden;
}

.detail-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.detail-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(0, 0, 0, 0.7) 50%,
    var(--primary-bg) 100%
  );
}

.detail-content {
  position: relative;
  z-index: 10;
  padding: 40px 60px;
  max-width: 1200px;
  margin: 0 auto;
}

.detail-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 40px;
  margin-bottom: 40px;
}

.detail-info {
  flex: 1;
}

.detail-title {
  font-size: 3rem;
  font-weight: 700;
  margin: 0 0 20px 0;
  line-height: 1.2;
  color: var(--text-primary);
}

.detail-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-secondary);
  font-size: 14px;
}

.detail-actions {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.action-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.action-btn-primary {
  background: var(--gradient-1);
  color: white;
}

.action-btn-primary:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
}

.action-btn-secondary {
  background: var(--card-bg);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}

.action-btn-secondary:hover {
  background: var(--secondary-bg);
  border-color: var(--accent-purple);
}

.detail-description {
  font-size: 16px;
  line-height: 1.7;
  color: var(--text-secondary);
  max-width: 700px;
}

/* --- Episodes Grid --- */
.episodes-section {
  margin-top: 40px;
}

.episodes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.episode-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid var(--border-color);
  position: relative;
}

.episode-card:hover {
  background: var(--secondary-bg);
  border-color: var(--accent-purple);
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(147, 51, 234, 0.2);
}

.episode-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.episode-number {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent-purple);
}

.episode-duration {
  font-size: 12px;
  color: var(--text-secondary);
}

.episode-title {
  font-size: 16px;
  font-weight: 600;
  margin: 0 0 8px 0;
}

.episode-indicator {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 8px;
  height: 8px;
  background: var(--watched-color);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.episode-card.watched .episode-indicator {
  opacity: 1;
}

/* --- Player --- */
.player-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.player-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: var(--accent-purple);
  border: none;
  color: white;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  z-index: 10;
}

/* --- Search Modal --- */
.search-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--primary-bg);
  z-index: 999;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex;
  flex-direction: column;
}

.search-modal.active {
  transform: translateY(0);
}

.search-header {
  padding: 20px 60px;
  background: var(--secondary-bg);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  gap: 20px;
}

.search-back {
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  transition: background-color 0.2s ease;
}

.search-back:hover {
  background: var(--card-bg);
}

.search-input {
  flex: 1;
  padding: 16px 24px;
  border: 2px solid var(--border-color);
  border-radius: 12px;
  background: var(--card-bg);
  color: var(--text-primary);
  font-size: 18px;
  outline: none;
  transition: border-color 0.2s ease;
}

.search-input:focus {
  border-color: var(--accent-purple);
}

.search-results {
  flex: 1;
  padding: 20px 60px;
  overflow-y: auto;
}

.search-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 0 20px;
}

/* --- Bottom Navigation --- */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--secondary-bg);
  border-top: 1px solid var(--border-color);
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 70px;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}

.nav-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: var(--text-secondary);
  transition: color 0.2s ease;
  padding: 8px;
  min-width: 60px;
}

.nav-tab.active {
  color: var(--accent-purple);
}

.nav-tab:hover {
  color: var(--text-primary);
}

.nav-icon {
  font-size: 20px;
  margin-bottom: 4px;
}

.nav-label {
  font-size: 11px;
  font-weight: 500;
}

/* --- Responsive --- */
@media (max-width: 768px) {
  .header {
    padding: 12px 16px;
  }
  
  .nav-menu {
    display: none;
  }
  
  .hero-content {
    left: 20px;
    right: 20px;
    max-width: none;
  }
  
  .hero-title {
    font-size: 2.5rem;
  }
  
  .genre-nav,
  .content-section,
  .detail-content,
  .search-header,
  .search-results {
    padding-left: 20px;
    padding-right: 20px;
  }
  
  .content-grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
  }
  
  .card-title-overlay {
    font-size: 13px;
    padding: 35px 10px 14px;
    min-height: 55px;
  }
  
  .detail-header {
    flex-direction: column;
    gap: 20px;
  }
  
  .detail-title {
    font-size: 2rem;
  }
}

@media (max-width: 480px) {
  .hero-title {
    font-size: 2rem;
  }
  
  .hero-actions {
    flex-direction: column;
    align-items: stretch;
    gap: 15px;
  }
  
  .hero-btn {
    width: 100%;
    justify-content: center;
  }
  
  .content-grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  
  .card-title-overlay {
    font-size: 12px;
    padding: 30px 8px 12px;
    min-height: 50px;
  }
}

/* Ocultar bottom nav en desktop */
@media (min-width: 769px) {
  .bottom-nav {
    display: none;
  }
  
  .main-content {
    padding-bottom: 0;
  }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@4.0.0/dist/hls.min.js"></script>
</head>
<body>

<div id="loader" class="loader-container">
    <div class="loader"></div>
</div>

<header class="header">
  <div class="header-content">
    <a href="#" class="logo" data-screen="home">Kawaii Play</a>
    <nav class="nav-menu">
      <a href="#" class="nav-item active" data-screen="home">Inicio</a>
      <a href="#" class="nav-item" data-screen="movies">Películas</a>
      <a href="#" class="nav-item" data-screen="series">Series</a>
      <a href="#" class="nav-item" data-screen="favorites">Mi Lista</a>
    </nav>
    <div class="header-actions">
      <button id="search-btn" class="header-btn"><i class="fas fa-search"></i></button>
    </div>
  </div>
</header>

<main class="main-content">
  <!-- Home Screen -->
  <div id="home" class="screen active">
    <section class="hero-section">
      <div id="hero-bg" class="hero-background"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 id="hero-title" class="hero-title"></h1>
        <p id="hero-description" class="hero-description"></p>
        <div class="hero-actions">
          <a id="hero-play" class="hero-btn hero-btn-primary">
            <i class="fas fa-play"></i>
            <span>Reproducir</span>
          </a>
          <a id="hero-info" class="hero-btn hero-btn-secondary">
            <i class="fas fa-info-circle"></i>
            <span>Más información</span>
          </a>
        </div>
      </div>
    </section>

    <div id="home-content">
      <!-- Contenido por secciones -->
    </div>
  </div>

  <!-- Movies Screen -->
  <div id="movies" class="screen">
    <div class="content-section">
      <h2 class="section-title">Películas</h2>
      <div id="movies-content" class="content-grid">
        <!-- Películas se cargarán aquí -->
      </div>
    </div>
  </div>

  <!-- Series Screen -->
  <div id="series" class="screen">
    <div class="content-section">
      <h2 class="section-title">Series</h2>
      <div id="series-content" class="content-grid">
        <!-- Series se cargarán aquí -->
      </div>
    </div>
  </div>

  <!-- Favorites Screen -->
  <div id="favorites" class="screen">
    <div class="content-section">
      <h2 class="section-title">Mi Lista</h2>
      <div id="favorites-content" class="content-grid">
        <!-- Favoritos se cargarán aquí -->
      </div>
    </div>
  </div>

  <!-- Detail Screen -->
  <div id="detail" class="screen">
    <div class="detail-screen">
      <div class="detail-hero">
        <img id="detail-bg" class="detail-bg" src="" alt="">
        <div class="detail-overlay"></div>
        <button id="detail-close" class="player-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="detail-content">
        <div class="detail-header">
          <div class="detail-info">
            <h1 id="detail-title" class="detail-title"></h1>
            <div class="detail-meta">
              <span class="meta-item" id="detail-year"></span>
              <span class="meta-item" id="detail-rating"></span>
              <span class="meta-item" id="detail-duration"></span>
              <span class="meta-item" id="detail-genre"></span>
            </div>
            <div class="detail-actions">
              <a id="detail-play" class="action-btn action-btn-primary">
                <i class="fas fa-play"></i>
                <span>Reproducir</span>
              </a>
              <a id="detail-favorite" class="action-btn action-btn-secondary">
                <i class="fas fa-heart"></i>
                <span>Mi Lista</span>
              </a>
            </div>
            <p id="detail-description" class="detail-description"></p>
          </div>
        </div>
        <div id="detail-episodes" class="episodes-section">
          <!-- Episodios si es serie -->
        </div>
      </div>
    </div>
  </div>

  <!-- Search Modal -->
  <div id="search-modal" class="search-modal">
    <div class="search-header">
      <button id="search-close" class="search-back"><i class="fas fa-arrow-left"></i></button>
      <input id="search-input" type="text" class="search-input" placeholder="Buscar películas, series...">
    </div>
    <div class="search-results">
      <div id="search-grid" class="search-grid">
        <!-- Resultados de búsqueda -->
      </div>
    </div>
  </div>
</main>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <a href="#" class="nav-tab active" data-screen="home">
    <i class="fas fa-home nav-icon"></i>
    <span class="nav-label">Inicio</span>
  </a>
  <a href="#" class="nav-tab" data-screen="movies">
    <i class="fas fa-film nav-icon"></i>
    <span class="nav-label">Películas</span>
  </a>
  <a href="#" class="nav-tab" data-screen="series">
    <i class="fas fa-tv nav-icon"></i>
    <span class="nav-label">Series</span>
  </a>
  <a href="#" class="nav-tab" data-screen="favorites">
    <i class="fas fa-star nav-icon"></i>
    <span class="nav-label">Mi Lista</span>
  </a>
</nav>

<script>
const DATA_URL = "https://raw.githubusercontent.com/R3D-GHOST/json/refs/heads/main/data.json";

// DOM Elements
const loader = document.getElementById('loader');
const screens = document.querySelectorAll('.screen');
const navItems = document.querySelectorAll('.nav-item, .nav-tab');
const searchModal = document.getElementById('search-modal');
const searchInput = document.getElementById('search-input');

// State
let allData = { movies: [], series: [] };
let favorites = JSON.parse(localStorage.getItem('kawaii_favorites')) || [];
let currentHeroIndex = 0;
let heroInterval;
let heroFeatured = [];

// --- Utility Functions ---
function switchScreen(screenId) {
  screens.forEach(screen => screen.classList.remove('active'));
  const targetScreen = document.getElementById(screenId);
  if (targetScreen) targetScreen.classList.add('active');
  
  // Update navigation active states
  navItems.forEach(item => item.classList.remove('active'));
  document.querySelectorAll(`[data-screen="${screenId}"]`).forEach(item => {
    item.classList.add('active');
  });
}

function getGenreColor(genre) {
  const colors = {
    'Acción': '#ff4444',
    'Comedia': '#ffaa00',
    'Drama': '#4488ff',
    'Terror': '#8844ff',
    'Romance': '#ff4488',
    'Ciencia Ficción': '#44ff88',
    'Aventura': '#ff8844',
    'Suspenso': '#448888',
    'Fantasía': '#8844aa'
  };
  return colors[genre] || '#666666';
}

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// Función para guardar el progreso del video
function saveVideoProgress(seriesTitle, episodeIndex, currentTime, duration) {
  const progressKey = `progress_${seriesTitle}_${episodeIndex}`;
  const progress = duration > 0 ? (currentTime / duration) * 100 : 0;
  
  localStorage.setItem(progressKey, JSON.stringify({
    currentTime: currentTime,
    duration: duration,
    progress: progress,
    lastWatched: new Date().toISOString()
  }));
}

// Función para marcar episodio como visto
function markEpisodeAsWatched(seriesTitle, episodeIndex) {
  const watchedKey = `watched_${seriesTitle}_${episodeIndex}`;
  localStorage.setItem(watchedKey, 'true');
}

// Función para verificar si un episodio fue visto
function isEpisodeWatched(seriesTitle, episodeIndex) {
  const watchedKey = `watched_${seriesTitle}_${episodeIndex}`;
  return localStorage.getItem(watchedKey) === 'true';
}

// --- Data Loading ---
async function loadData() {
  try {
    const response = await fetch(DATA_URL);
    const data = await response.json();
    
    allData.movies = data.filter(item => item.video_url && !item.episodes);
    allData.series = data.filter(item => item.episodes && item.episodes.length > 0);
    
    return allData;
  } catch (error) {
    console.error('Error loading data:', error);
    return { movies: [], series: [] };
  }
}

// --- Hero Section ---
function setupHero() {
  heroFeatured = [...allData.movies, ...allData.series].slice(0, 5);
  if (heroFeatured.length === 0) return;

  function updateHero() {
    const item = heroFeatured[currentHeroIndex];
    const heroBg = document.getElementById('hero-bg');
    const heroTitle = document.getElementById('hero-title');
    const heroDesc = document.getElementById('hero-description');
    
    heroBg.style.backgroundImage = `url(${item.coverImage || item.poster || ''})`;
    heroTitle.textContent = item.title;
    heroDesc.textContent = item.description || item.synopsis || 'Disfruta de este contenido exclusivo';
  }

  updateHero();
  heroInterval = setInterval(() => {
    currentHeroIndex = (currentHeroIndex + 1) % heroFeatured.length;
    updateHero();
  }, 5000);

  // Hero actions
  document.getElementById('hero-play').onclick = () => {
    const item = heroFeatured[currentHeroIndex];
    if (item.video_url) {
      window.open(item.video_url, '_blank');
    } else if (item.episodes) {
      showDetail(item);
    }
  };

  document.getElementById('hero-info').onclick = () => {
    showDetail(heroFeatured[currentHeroIndex]);
  };
}

// --- Genre Navigation ---
function setupGenres() {
  // Eliminar completamente la sección de géneros
  const genreNav = document.getElementById('genre-nav');
  if (genreNav) {
    genreNav.remove();
  }
}

// --- Content Rendering ---
function renderContentByGenre(items, genre) {
  const homeContent = document.getElementById('home-content');
  homeContent.innerHTML = '';
  
  if (items.length === 0) {
    homeContent.innerHTML = `<p style="text-align: center; color: var(--text-secondary); padding: 40px;">No hay contenido disponible para el género ${genre}</p>`;
    return;
  }
  
  const section = document.createElement('div');
  section.className = 'content-section';
  
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `
    <h2 class="section-title">${genre}</h2>
    <span class="section-subtitle">${items.length} resultados</span>
  `;
  
  const grid = document.createElement('div');
  grid.className = 'content-grid';
  
  items.forEach(item => {
    grid.appendChild(createContentCard(item));
  });
  
  section.appendChild(header);
  section.appendChild(grid);
  homeContent.appendChild(section);
}

function createContentCard(item) {
  const card = document.createElement('a');
  card.className = 'content-card';
  
  // Add movie/series class for styling
  if (item.episodes) {
    card.classList.add('series');
  } else {
    card.classList.add('movie');
  }
  
  card.href = item.video_url || '#';
  if (item.video_url) {
    card.target = '_blank';
  } else {
    card.href = '#';
    card.onclick = (e) => {
      e.preventDefault();
      showDetail(item);
    };
  }

  const img = document.createElement('img');
  img.className = 'card-image';
  img.src = item.coverImage || item.poster || '';
  img.alt = item.title;
  img.loading = 'lazy';

  // Add season indicator for series
  if (item.episodes && item.season) {
    const seasonIndicator = document.createElement('div');
    seasonIndicator.className = 'season-indicator';
    seasonIndicator.textContent = `Temporada ${item.season}`;
    card.appendChild(seasonIndicator);
  }

  card.appendChild(img);
  return card;
}

function renderMovies() {
  const container = document.getElementById('movies-content');
  container.innerHTML = '';
  
  allData.movies.forEach(movie => {
    container.appendChild(createContentCard(movie));
  });
}

function renderSeries() {
  const container = document.getElementById('series-content');
  container.innerHTML = '';

  allData.series.forEach(series => {
    container.appendChild(createContentCard(series));
  });
}

function renderFavorites() {
  const container = document.getElementById('favorites-content');
  container.innerHTML = '';
  
  const favItems = favorites.map(id => {
    return allData.movies.find(m => m.title === id) || allData.series.find(s => s.title === id);
  }).filter(Boolean);
  
  if (favItems.length === 0) {
    container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">No tienes contenido en tu lista</p>';
    return;
  }
  
  favItems.forEach(item => {
    container.appendChild(createContentCard(item));
  });
}

function renderHome() {
  const homeContent = document.getElementById('home-content');
  homeContent.innerHTML = '';
  
  // Render movies section
  if (allData.movies.length > 0) {
    const moviesSection = document.createElement('div');
    moviesSection.className = 'content-section';
    moviesSection.innerHTML = `
      <div class="section-header">
        <h2 class="section-title">Películas Populares</h2>
      </div>
      <div class="content-grid">
        ${allData.movies.slice(0, 8).map(movie => `
          <a href="${movie.video_url}" target="_blank" class="content-card movie">
            <img src="${movie.coverImage || movie.poster || ''}" alt="${movie.title}" class="card-image" loading="lazy">
          </a>
        `).join('')}
      </div>
    `;
    homeContent.appendChild(moviesSection);
  }
  
  // Render series section
  if (allData.series.length > 0) {
    const seriesSection = document.createElement('div');
    seriesSection.className = 'content-section';
    seriesSection.innerHTML = `
      <div class="section-header">
        <h2 class="section-title">Series Destacadas</h2>
      </div>
      <div class="content-grid">
        ${allData.series.slice(0, 8).map(series => `
          <div class="content-card series" onclick="showDetail(${JSON.stringify(series).replace(/"/g, '"')})">
            <img src="${series.coverImage || series.poster || ''}" alt="${series.title}" class="card-image" loading="lazy">
            ${series.season ? `<div class="season-indicator">Temporada ${series.season}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
    homeContent.appendChild(seriesSection);
  }
}

// --- Detail Screen ---
function showDetail(item) {
  // Hacer scroll al principio de la página
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  const detailScreen = document.getElementById('detail');
  const detailBg = document.getElementById('detail-bg');
  const detailTitle = document.getElementById('detail-title');
  const detailYear = document.getElementById('detail-year');
  const detailRating = document.getElementById('detail-rating');
  const detailDuration = document.getElementById('detail-duration');
  const detailGenre = document.getElementById('detail-genre');
  const detailDesc = document.getElementById('detail-description');
  const detailPlay = document.getElementById('detail-play');
  const detailFavorite = document.getElementById('detail-favorite');
  const detailEpisodes = document.getElementById('detail-episodes');
  
  detailBg.src = item.coverImage || item.poster || '';
  detailTitle.textContent = item.title;
  detailYear.textContent = item.year || 'N/A';
  detailRating.textContent = `★ ${item.rating || 'N/A'}`;
  detailDuration.textContent = item.duration || 'N/A';
  detailGenre.textContent = item.genre || 'Sin género';
  detailDesc.textContent = item.description || item.synopsis || 'Sin descripción disponible';
  
  // Update favorite button
  const isFavorite = favorites.includes(item.title);
  detailFavorite.innerHTML = `<i class="fas fa-heart${isFavorite ? '' : '-o'}"></i><span>${isFavorite ? 'En Mi Lista' : 'Añadir a Mi Lista'}</span>`;
  detailFavorite.className = `action-btn action-btn-secondary ${isFavorite ? 'active' : ''}`;
  
  detailFavorite.onclick = () => {
    toggleFavorite(item.title);
    // Actualizar el botón inmediatamente
    const newIsFavorite = favorites.includes(item.title);
    detailFavorite.innerHTML = `<i class="fas fa-heart${newIsFavorite ? '' : '-o'}"></i><span>${newIsFavorite ? 'En Mi Lista' : 'Añadir a Mi Lista'}</span>`;
    detailFavorite.className = `action-btn action-btn-secondary ${newIsFavorite ? 'active' : ''}`;
  };
  
  // Setup play button
  if (item.video_url) {
    detailPlay.href = item.video_url;
    detailPlay.target = '_blank';
  } else if (item.episodes && item.episodes.length > 0) {
    detailPlay.href = item.episodes[0].video_url;
    detailPlay.target = '_blank';
  }
  
  // Show episodes if series
  if (item.episodes && item.episodes.length > 0) {
    detailEpisodes.style.display = 'block';
    renderEpisodes(item);
  } else {
    detailEpisodes.style.display = 'none';
  }
  
  switchScreen('detail');
}

function renderEpisodes(series) {
  const episodesSection = document.getElementById('detail-episodes');
  episodesSection.innerHTML = '<h3 style="margin-bottom: 20px;">Episodios</h3>';
  
  const episodesGrid = document.createElement('div');
  episodesGrid.className = 'episodes-grid';
  
  series.episodes.forEach((episode, index) => {
    const episodeCard = document.createElement('a');
    episodeCard.className = 'episode-card';
    
    // Check if episode was watched
    const isWatched = isEpisodeWatched(series.title, index);
    if (isWatched) {
      episodeCard.classList.add('watched');
    }
    
    episodeCard.href = episode.video_url;
    episodeCard.target = '_blank';
    episodeCard.innerHTML = `
      <div class="episode-indicator"></div>
      <div class="episode-header">
        <span class="episode-number">Episodio ${index + 1}</span>
        <span class="episode-duration">${episode.duration || 'N/A'}</span>
      </div>
    `;
    
    // Add click event to mark as watched
    episodeCard.addEventListener('click', () => {
      markEpisodeAsWatched(series.title, index);
      episodeCard.classList.add('watched');
    });
    
    episodesGrid.appendChild(episodeCard);
  });
  
  episodesSection.appendChild(episodesGrid);
}

function toggleFavorite(itemId) {
  const index = favorites.indexOf(itemId);
  if (index > -1) {
    favorites.splice(index, 1);
  } else {
    favorites.push(itemId);
  }
  localStorage.setItem('kawaii_favorites', JSON.stringify(favorites));
  
  // Update UI
  const detailFavorite = document.getElementById('detail-favorite');
  const isFavorite = favorites.includes(itemId);
  detailFavorite.innerHTML = `<i class="fas fa-heart${isFavorite ? '' : '-o'}"></i><span>${isFavorite ? 'En Mi Lista' : 'Añadir a Mi Lista'}</span>`;
  detailFavorite.className = `action-btn action-btn-secondary ${isFavorite ? 'active' : ''}`;
}

// --- Search ---
function setupSearch() {
  const searchBtn = document.getElementById('search-btn');
  const searchClose = document.getElementById('search-close');
  const searchInput = document.getElementById('search-input');
  const searchGrid = document.getElementById('search-grid');
  
  searchBtn.onclick = () => {
    searchModal.classList.add('active');
    searchInput.focus();
  };
  
  searchClose.onclick = () => {
    searchModal.classList.remove('active');
    searchInput.value = '';
    searchGrid.innerHTML = '';
  };
  
  searchInput.oninput = (e) => {
    const query = e.target.value.toLowerCase();
    if (query.length < 2) {
      searchGrid.innerHTML = '';
      return;
    }
    
    const results = [
      ...allData.movies.filter(m => m.title.toLowerCase().includes(query)),
      ...allData.series.filter(s => s.title.toLowerCase().includes(query))
    ];
    
    searchGrid.innerHTML = '';
    results.forEach(item => {
      const card = createContentCard(item);
      // Add click handler to close modal and show detail
      card.addEventListener('click', (e) => {
        if (!item.video_url) {
          e.preventDefault();
          searchModal.classList.remove('active');
          searchInput.value = '';
          searchGrid.innerHTML = '';
          showDetail(item);
        }
      });
      searchGrid.appendChild(card);
    });
    
    if (results.length === 0) {
      searchGrid.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">No se encontraron resultados</p>';
    }
  };
}

// --- Navigation ---
navItems.forEach(item => {
  item.onclick = (e) => {
    e.preventDefault();
    const screen = e.target.closest('[data-screen]').dataset.screen;
    
    if (screen === 'movies') renderMovies();
    if (screen === 'series') renderSeries();
    if (screen === 'favorites') renderFavorites();
    if (screen === 'search') return; // Handled separately
    
    switchScreen(screen);
  };
});

document.getElementById('detail-close').onclick = () => switchScreen('home');

// --- Initialization ---
async function init() {
  await loadData();
  setupHero();
  setupSearch();
  renderHome();
  setupGenres();
  
  // Hide loader
  setTimeout(() => {
    loader.classList.add('hidden');
  }, 1000);
}

// Start the app
init();
</script>
</body>
</html>
